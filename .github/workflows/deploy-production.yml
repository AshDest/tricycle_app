name: 🚀 Deploy to Production (OKAMI)

on:
  push:
    branches: [production]

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest

    steps:
      - name: 🚀 Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script_stop: true
          script: |
            cd /var/www/tricycle_prod

            echo "🚀 Démarrage du déploiement PRODUCTION..."

            # Mode maintenance
            php artisan down --message="Mise à jour en cours..." --retry=60 || true

            # Pull des dernières modifications
            echo "📥 Récupération du code..."
            git pull origin production

            # Installer les dépendances PHP
            echo "📦 Installation Composer..."
            composer install --no-dev --optimize-autoloader --no-interaction

            # Build assets
            echo "📦 Build des assets..."
            npm ci && npm run build

            # Exécuter les migrations
            echo "🗄️ Migrations..."
            php artisan migrate --force

            # Cache et optimisation
            echo "⚡ Optimisation..."
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            php artisan event:cache
            php artisan optimize

            # Permissions
            echo "🔐 Permissions..."
            sudo chown -R www-data:www-data storage bootstrap/cache
            sudo chmod -R 775 storage bootstrap/cache

            # Redémarrer les services
            echo "🔄 Redémarrage des services..."
            sudo systemctl reload php8.2-fpm || true
            sudo systemctl reload nginx || true

            # Redémarrer le queue worker production
            echo "🔄 Redémarrage du queue worker..."
            sudo supervisorctl restart tricycle-prod-queue-worker:* || echo "⚠️ Queue worker non configuré"

            # Désactiver le mode maintenance
            php artisan up

            echo "✅ Déploiement PRODUCTION terminé! Commit: $(git rev-parse --short HEAD)"

